services:
  db:
    image: postgres:16-alpine
    container_name: cyberguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD não definido}
      POSTGRES_DB: cyberguard
    # Porta 5432 NÃO exposta ao host — banco acessível só internamente pelo app
    volumes:
      - cyberguard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyberguard-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD não definido}@db:5432/cyberguard
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET não definido}
      NEXT_PUBLIC_APP_NAME: CyberGuard
      NODE_ENV: production
    ports:
      # Bind somente à interface Tailscale — não expõe à internet pública
      - "${BIND_HOST:-127.0.0.1}:80:3000"
    command: sh -c "node node_modules/prisma/build/index.js db push --accept-data-loss && node server.js"

volumes:
  cyberguard-pgdata:
