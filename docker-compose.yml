services:
  db:
    image: postgres:16-alpine
    container_name: cyberguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberguard
    ports:
      - "5432:5432"
    volumes:
      - cyberguard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyberguard-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cyberguard
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-ABCDEFGH12345678}
      NEXT_PUBLIC_APP_NAME: CyberGuard
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: sh -c "node node_modules/prisma/build/index.js db push --accept-data-loss && node server.js"

volumes:
  cyberguard-pgdata:
